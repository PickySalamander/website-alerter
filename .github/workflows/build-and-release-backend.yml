name: Build and Release Backend
run-name: "Building ${{ github.workflow }}-${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      email:
        description: The email address to send the notifications to
        type: string
      ruleEnabled:
        description: Whether the CloudWatch rule is enabled or not
        type: choice
        options:
          - ""
          - "true"
          - "false"
        default: ""

  push:
    paths:
      - 'backend/**'
      - 'shared/**'
    branches:
      - main

# Kill previous builds that are currently running
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # AWS region to deploy to
  AWS_REGION: "us-east-1"

  # Node version used to build the product
  NODE_VERSION: "24"

permissions:
  id-token: write # This is required for requesting the JWT from AWS
  contents: read  # This is required for actions/checkout

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Checkout the branch code from git
      - name: Checkout Code
        uses: actions/checkout@v6

      # Authenticate with AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_NUMBER }}:role/${{ vars.AWS_GITHUB_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # Download and install the Node version used to build
      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Install dependencies
      - name: Install Node Dependencies
        run: npm ci

      # Build Shared
      - name: Build Shared
        run: npm run build -w shared

      # Run tests
      - name: Run Shared Tests
        run: npm run test -w shared

      # Run the deploy
      - name: CDK Deploy
        run: |
          INPUT_EMAIL="${{ inputs.email }}"
          RULE_ENABLED="${{ inputs.ruleEnabled }}"
          npm run deploy -w backend -- --parameters ${INPUT_EMAIL:+notificationEmail=$INPUT_EMAIL} ${RULE_ENABLED:+enableSchedule=$RULE_ENABLED}

      # Deploy
      - name: Deploy to S3
        run: |
          cd backend/prompt
          aws s3 sync --delete --exclude "research.ipynb" --exclude "input/*" . s3://website-alerter-${{ vars.AWS_ACCOUNT_NUMBER }}/prompt/

          cd ../src/email
          aws s3 sync --delete . s3://website-alerter-${{ vars.AWS_ACCOUNT_NUMBER }}/email/
