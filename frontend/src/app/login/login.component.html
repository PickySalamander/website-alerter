<mat-card>
	<form [formGroup]="loginForm" (ngSubmit)="submit()">
		<mat-card-content>
			<h2>Welcome to Website Alerter!</h2>
			<p>To get started please log in below</p>

			<mat-form-field>
				<input matInput placeholder="Email" formControlName="email" autocomplete="email" required>
			</mat-form-field>

			<mat-form-field>
				<input formControlName="password" matInput placeholder="Password" [type]="hidePassword ? 'password' : 'text'"
				       required autocomplete="current-password">
				<mat-icon matSuffix (click)="hidePassword = !hidePassword">
					{{ hidePassword ? 'visibility_off' : 'visibility' }}
				</mat-icon>
			</mat-form-field>
		</mat-card-content>

		<mat-card-actions>
			<button color="primary" mat-flat-button [disabled]="!loginForm.valid" aria-label="Press to login">
				<span>Login</span>
			</button>
		</mat-card-actions>
	</form>
</mat-card>
